# ============================================================
# Prometheus 스크레이프 설정 — 별도 "모니터링 EC2" 에서 실행
#
#  ▶ 대상(H-Insight-AI 앱 + exporter)이 있는 서버의 프라이빗 IP 로 아래
#    <TARGET_EC2_PRIVATE_IP> 를 전부 치환하세요. (예: 10.0.1.23)
#
#  ▶ 로컬 한 대에서 테스트하려면:
#     - macOS/Windows(Docker Desktop): <TARGET_EC2_PRIVATE_IP> → host.docker.internal
#     - Linux 단일 호스트          : <TARGET_EC2_PRIVATE_IP> → 호스트 LAN IP (172.17.0.1 등)
#
#  포트 매핑(대상 서버에서 노출되는 포트)은 프로젝트 README "모니터링" 표 참고.
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'h-insight-baseline'

scrape_configs:
  # Prometheus 자기 자신
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot 앱 (호스트 실행, actuator) — /actuator/prometheus
  - job_name: 'spring-actuator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['<TARGET_EC2_PRIVATE_IP>:8080']
        labels:
          application: 'H-Insight-AI'

  # 호스트 자원 (node-exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['<TARGET_EC2_PRIVATE_IP>:9100']

  # 컨테이너별 리소스 (cadvisor) — 대상 서버에서 호스트 8085 로 노출
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['<TARGET_EC2_PRIVATE_IP>:8085']

  # Redis (redis_exporter)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['<TARGET_EC2_PRIVATE_IP>:9121']

  # MySQL (mysqld_exporter) — 대상 서버에 MYSQLD_EXPORTER_DSN 설정 후 UP
  - job_name: 'mysqld-exporter'
    static_configs:
      - targets: ['<TARGET_EC2_PRIVATE_IP>:9104']

  # Kafka (kafka_exporter) — 대상 서버를 --profile local 로 띄웠을 때만 UP
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['<TARGET_EC2_PRIVATE_IP>:9308']

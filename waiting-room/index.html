<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>접속 대기 중 | H-Insight-AI</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="waiting-wrap">
    <section class="waiting-card" aria-live="polite">
        <h1 class="logo"><span class="logo-accent">H</span>-Insight<span class="logo-accent">-AI</span></h1>

        <p class="waiting-badge"><span class="waiting-dot" aria-hidden="true"></span>접속 대기 중</p>

        <h2 id="waitingTitle" class="waiting-title">잠시 후 입장입니다</h2>
        <p class="waiting-subtitle">순서가 되면 자동으로 이동합니다. 새로고침하지 않으셔도 돼요.</p>

        <div class="queue-number">
            <span class="queue-number-label">내 대기 순번</span>
            <strong id="queuePosition" class="queue-number-value">&ndash;</strong>
        </div>

        <div class="queue-progress" role="progressbar" aria-label="대기열 진행률"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="queueProgressBar" class="queue-progress-bar" style="width: 0%"></div>
        </div>

        <dl class="queue-stats">
            <div class="queue-stat">
                <dt>앞에 남은 인원</dt>
                <dd id="queueAhead">&ndash;</dd>
            </div>
            <div class="queue-stat">
                <dt>예상 대기 시간</dt>
                <dd id="queueEta">&ndash;</dd>
            </div>
        </dl>

        <p id="queueMessage" class="waiting-message">대기열 정보를 불러오는 중이에요&hellip;</p>
    </section>

    <p class="waiting-footnote">이 페이지를 닫으면 대기 순번이 사라질 수 있어요.</p>
</main>

<script src="app.js"></script>
</body>
</html>

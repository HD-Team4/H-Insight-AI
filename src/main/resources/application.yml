spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: H-Insight-AI
  profiles:
    active: dev
    include: secret
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
  # 정적 리소스 핸들러 체인 캐시
  # — jar 내부 리소스 URL 반복 해석(CPU 병목)
  web:
    resources:
      chain:
        enabled: true
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            # 기본값 gemini-2.0-flash 는 무료 티어 쿼터가 0 이라 429 → 무료 쿼터가 있는 2.5-flash 사용
            model: ${GEMINI_MODEL:gemini-2.5-flash}
  # 벡터DB (Postgres/pgvector) — 상품추천 챗봇 검색용 두 번째 데이터소스 (MySQL 이 primary)
  vector-datasource:
    driver-class-name: org.postgresql.Driver
    url: ${VECTOR_DB_URL}
    username: ${VECTOR_DB_USERNAME}
    password: ${VECTOR_DB_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true   # at-least-once + 브로커측 중복 방지
    consumer:                       # 급상승 랭킹(HotTrend) 스피드 레이어용 컨슈머
      group-id: hinsight-hot-trend
      auto-offset-reset: latest     # 실시간 트렌드 → 지금부터의 이벤트만
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hinsight.**.model
  configuration:
    map-underscore-to-camel-case: true

server:
  error:
    include-stacktrace: never
    include-message: never

product:
  list:
    page-size: 20

# 정적 리소스(CSS/JS/영상 mp4) 오프로드 대상 CDN(CloudFront) 도메인
#  - S3(hf4-s3)의 static/ 경로를 오리진으로 서빙. 템플릿은 이 설정값을 참조(하드코딩 금지)
#  - 로컬/다른 환경에선 CDN_URL 로 오버라이드 가능
app:
  cdn:
    url: ${CDN_URL:https://d3czavkc472er9.cloudfront.net}

# Ollama (BGE-M3 임베딩 서버) — 상품추천 챗봇 쿼리 임베딩
ollama:
  base-url: http://localhost:11434
  embedding-model: bge-m3

# 라이브 리뷰 Q&A RAG 튜닝
rag:
  # 리뷰봇 질문 군집화·트리거 (LiveQuestionBotService / SemanticQuestionAggregator)
  bot:
    threshold: 3                   # 한 군집이 이 횟수 이상 반복되면 답변 트리거
    window-seconds: 120            # 군집 유지 창(초)
    cooldown-seconds: 300          # 같은 군집 재답변 방지(초)
    similarity-threshold: 0.85     # 같은 질문으로 볼 코사인 유사도 하한.
                                   # 낮으면 "옷 밝아요?"(색) 와 "옷 사이즈?"(치수)가 한 군집으로 섞여 오답을 냄 → 0.85로 보수적 분리
  # 시맨틱 답변 캐시 (Redis): 유사 질문 재답변 시 LLM 호출을 건너뛰어 토큰(비용) 절감
  cache:
    enabled: true
    similarity-threshold: 0.92     # 답변 재사용 코사인 유사도 하한(보수적: 사실상 같은 질문만 재사용)
    ttl-seconds: 1800              # 캐시 신선도(30분). 리뷰/공식 스펙 갱신 반영 위해 짧게 유지
    max-entries-per-product: 50    # 상품당 캐시 후보 상한(코사인 계산 비용·메모리 관리)
  # 프롬프트 최적화: 컨텍스트를 잘라 Gemini 로 넘기는 토큰 축소
  context:
    max-official-chars: 600        # 공식 스펙 1건 최대 길이
    max-review-chars: 280          # 유저 리뷰 1건 최대 길이
    max-total-chars: 2000          # 조립된 컨텍스트 총 상한
  # 앞단 가드레일: 집계/LLM 이전에 비질문·비방 즉시 파기
  guard:
    min-length: 2                  # 정규화 후 이 길이 미만이면 질문으로 안 봄
    badwords-resource: rag/badwords.txt   # Aho-Corasick 로 로딩할 금칙어 사전(classpath)

# 노션 연동 (대시보드 -> 노션 페이지 이미지 첨부)
notion:
  token: ${NOTION_TOKEN:}
  version: 2026-03-11
  base-url: https://api.notion.com/v1

# 주간 리포트 자동 발송 (노션 블록 + 메일)
report:
  schedule:
    enabled: ${REPORT_SCHEDULE_ENABLED:true}
    cron: ${REPORT_SCHEDULE_CRON:0 0 8 * * MON}   # 매주 월요일 08:00
    zone: Asia/Seoul
  period: 1w                                        # 자동 발송 기준 기간
  mail:
    from: ${MAIL_FROM:}                             # 미설정(또는 spring.mail 미설정) 시 메일 skip

springdoc:
  # 뷰(HTML 페이지) 컨트롤러까지 문서에 포함 시도.
  # (기본값 false 면 응답 바디를 반환하는 API 엔드포인트만 문서화됨)
  model-and-view-allowed: true
  swagger-ui:
    operations-sorter: method   # HTTP 메서드 순 정렬
    tags-sorter: alpha          # 컨트롤러(태그) 이름 순 정렬

# ==========================================
# 모니터링 (Actuator + Prometheus)
#  - 별도 모니터링 EC2의 Prometheus 가 http://<이 서버>:8080/actuator/prometheus 를 스크레이프
#  - 앱은 호스트에서 실행(컨테이너 아님). 운영에선 보안그룹으로 모니터링 EC2 IP 만 8080 허용 권장
#  - HikariCP / JVM 힙·GC / 스레드풀 지표는 actuator 추가만으로 자동 수집됨
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics   # /actuator/prometheus, /actuator/health, /actuator/metrics 만 노출
  endpoint:
    health:
      show-details: always                    # 내부망 baseline 용. 외부 공개 시 when-authorized 로 낮출 것
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}  # 모든 지표에 application 라벨 부여(대시보드 필터용)
    distribution:
      percentiles-histogram:
        http.server.requests: true             # p95/p99 계산용 히스토그램 버킷 활성화
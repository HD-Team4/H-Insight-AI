spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: H-Insight-AI
  profiles:
    active: dev
    include: secret
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            # 기본값 gemini-2.0-flash 는 무료 티어 쿼터가 0 이라 429 → 무료 쿼터가 있는 2.5-flash 사용
            model: ${GEMINI_MODEL:gemini-2.5-flash}
  # 벡터DB (Postgres/pgvector) — 상품추천 챗봇 검색용 두 번째 데이터소스 (MySQL 이 primary)
  vector-datasource:
    driver-class-name: org.postgresql.Driver
    url: ${VECTOR_DB_URL}
    username: ${VECTOR_DB_USERNAME}
    password: ${VECTOR_DB_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true   # at-least-once + 브로커측 중복 방지

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hinsight.**.model
  configuration:
    map-underscore-to-camel-case: true

server:
  error:
    include-stacktrace: never
    include-message: never

product:
  list:
    page-size: 20

# Ollama (BGE-M3 임베딩 서버) — 상품추천 챗봇 쿼리 임베딩
ollama:
  base-url: http://localhost:11434
  embedding-model: bge-m3


springdoc:
  # 뷰(HTML 페이지) 컨트롤러까지 문서에 포함 시도.
  # (기본값 false 면 응답 바디를 반환하는 API 엔드포인트만 문서화됨)
  model-and-view-allowed: true
  swagger-ui:
    operations-sorter: method   # HTTP 메서드 순 정렬
    tags-sorter: alpha          # 컨트롤러(태그) 이름 순 정렬
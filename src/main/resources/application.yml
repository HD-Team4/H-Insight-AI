spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: H-Insight-AI
  profiles:
    active: dev
    include: secret
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true   # at-least-once + 브로커측 중복 방지

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hinsight.**.model
  configuration:
    map-underscore-to-camel-case: true

server:
  error:
    include-stacktrace: never
    include-message: never

product:
  list:
    page-size: 20

# 노션 연동 (대시보드 -> 노션 페이지 이미지 첨부)
notion:
  token: ${NOTION_TOKEN:}
  version: 2026-03-11
  base-url: https://api.notion.com/v1


springdoc:
  # 뷰(HTML 페이지) 컨트롤러까지 문서에 포함 시도.
  # (기본값 false 면 응답 바디를 반환하는 API 엔드포인트만 문서화됨)
  model-and-view-allowed: true
  swagger-ui:
    operations-sorter: method   # HTTP 메서드 순 정렬
    tags-sorter: alpha          # 컨트롤러(태그) 이름 순 정렬
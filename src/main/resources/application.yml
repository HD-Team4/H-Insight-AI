spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: H-Insight-AI
  profiles:
    active: dev
    include: secret
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hinsight.**.model.vo
  configuration:
    map-underscore-to-camel-case: true

server:
  error:
    include-stacktrace: never
    include-message: never

product:
  list:
    page-size: 20

springdoc:
  # 뷰(HTML 페이지) 컨트롤러까지 문서에 포함 시도.
  # (기본값 false 면 응답 바디를 반환하는 API 엔드포인트만 문서화됨)
  model-and-view-allowed: true
  swagger-ui:
    operations-sorter: method   # HTTP 메서드 순 정렬
    tags-sorter: alpha          # 컨트롤러(태그) 이름 순 정렬
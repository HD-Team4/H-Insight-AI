spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: H-Insight-AI
  profiles:
    active: dev
    include: secret
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hinsight.**.model
  configuration:
    map-underscore-to-camel-case: true

server:
  error:
    include-stacktrace: never
    include-message: never

product:
  list:
    page-size: 20
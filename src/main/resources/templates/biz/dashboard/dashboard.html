<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Insight-AI 비즈니스 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- biz 전용 헤더 (고객 헤더와 분리). 공유 CSS 클래스만 재사용 -->
<div class="top-bar"></div>
<header class="container">
    <div class="header-main">
        <a th:href="@{/biz/dashboard}" class="logo">H-Insight <span style="color: var(--accent);">Biz</span></a>
        <div class="header-utils">
            <span><span sec:authentication="name">기업</span> 님</span>
            <form th:action="@{/biz/logout}" method="post" style="display:inline; margin:0;">
                <button type="submit"
                        style="background:none; border:none; padding:0; cursor:pointer; color:inherit; font:inherit; font-weight:500;">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<!-- 기업 로그인 성공 확인용 임시 랜딩. 대시보드 실제 내용은 별도 작업. -->
<main class="container" style="padding-top: 40px;">
    <h1 class="section-title" style="margin-top: 0;">비즈니스 대시보드</h1>
    <p style="color: var(--text-sub);">
        <span sec:authentication="name">기업</span> 계정으로 로그인되었습니다. (ROLE_BIZ)
    </p>
    <p style="color: var(--text-sub); margin-top: 8px;">대시보드 콘텐츠는 준비 중입니다.</p>
</main>
</body>
</html>

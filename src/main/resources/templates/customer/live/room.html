<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<th:block layout:fragment="content">
    <style>
        /* 리뷰봇 답변 — 채팅 헤더의 버튼으로 열리는 팝업(모달)에 Q/A 기록을 모아 보여줌 */
        .live-panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .live-bot-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #34c759;
            background: #eef9f0;
            color: #0f9d58;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 999px;
            cursor: pointer;
        }
        .live-bot-btn[hidden] { display: none; }
        .live-bot-btn:hover { background: #e2f6e9; }
        .live-bot-btn.has-new { animation: botPulse 1.1s ease-in-out infinite; }
        @keyframes botPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.5); }
            50%      { box-shadow: 0 0 0 5px rgba(52, 199, 89, 0); }
        }
        .live-bot-badge {
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            background: #34c759;
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        /* 모달 오버레이 */
        .live-bot-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(20, 40, 30, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .live-bot-modal-overlay[hidden] { display: none; }
        .live-bot-modal {
            width: 100%;
            max-width: 460px;
            max-height: 78vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border: 1px solid #34c759;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
            overflow: hidden;
        }
        .live-bot-modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #eef9f0;
            border-bottom: 1px solid rgba(52, 199, 89, 0.3);
            font-size: 14px;
            font-weight: 800;
            color: #0f9d58;
        }
        .live-bot-modal-close {
            border: none; background: transparent; color: #0f9d58;
            font-size: 16px; line-height: 1; cursor: pointer; padding: 4px; border-radius: 6px;
        }
        .live-bot-modal-close:hover { background: rgba(52, 199, 89, 0.15); }
        .live-bot-modal-body {
            padding: 14px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* Q/A 쌍 카드 — 배지로 질문·답변을 명확히 구분 */
        .live-bot-item { border: 1px solid rgba(52, 199, 89, 0.35); border-radius: 12px; overflow: hidden; }
        .live-bot-item .live-bot-item-q {
            display: flex; gap: 8px; align-items: baseline;
            padding: 10px 12px;
            background: #eef9f0;
            font-size: 13px; font-weight: 700; color: #14522f; line-height: 1.4;
        }
        .live-bot-item .live-bot-item-a {
            display: flex; gap: 8px; align-items: baseline;
            padding: 10px 12px;
            font-size: 13px; line-height: 1.55; color: #2c6b47;
            white-space: pre-wrap; word-break: break-word;
        }
        .live-bot-tag {
            flex: 0 0 auto;
            width: 18px; height: 18px;
            border-radius: 50%;
            font-size: 11px; font-weight: 800; color: #ffffff;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .live-bot-tag.q { background: #0f9d58; }
        .live-bot-tag.a { background: #8bc7a2; }
        .live-bot-item .live-bot-item-time { font-size: 10px; color: #6aa77f; padding: 0 12px 8px; }
        .live-bot-empty { font-size: 13px; color: #6aa77f; text-align: center; padding: 24px 0; }
        .live-bot-modal-foot {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 10px 16px;
            border-top: 1px solid rgba(52, 199, 89, 0.25);
            background: #f6fdf8;
        }
        .live-bot-modal-foot[hidden] { display: none; }
        .live-bot-page-btn {
            border: 1px solid rgba(52, 199, 89, 0.5);
            background: #ffffff; color: #0f9d58;
            font-size: 12px; font-weight: 700;
            padding: 4px 12px; border-radius: 999px; cursor: pointer;
        }
        .live-bot-page-btn:disabled { opacity: 0.4; cursor: default; }
        .live-bot-page-btn:not(:disabled):hover { background: #e2f6e9; }
        .live-bot-page-info { font-size: 12px; font-weight: 700; color: #14522f; min-width: 46px; text-align: center; }
        /* 새 답변 토스트 — 채팅 패널(이미 position:absolute) 헤더 아래에 몇 초 떴다가 사라짐 */
        .live-bot-toast {
            position: absolute;
            top: 62px;
            left: 10px;
            right: 10px;
            transform: translateY(-8px);
            z-index: 20;
            padding: 10px 14px;
            background: #ffffff;
            border: 1px solid #34c759;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 157, 88, 0.22);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            cursor: pointer;
        }
        .live-bot-toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .live-bot-toast .live-bot-toast-head { font-size: 11px; font-weight: 800; color: #0f9d58; margin-bottom: 3px; }
        .live-bot-toast .live-bot-toast-q { font-size: 12px; font-weight: 700; color: #14522f; line-height: 1.35; }
        .live-bot-toast .live-bot-toast-a {
            margin-top: 3px;
            font-size: 12px;
            line-height: 1.5;
            color: #2c6b47;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
    <div class="live-room" th:data-live-session-id="${liveSession.liveSessionId}">
        <section class="live-stage">
            <div class="live-video-shell">
                <div class="live-video-topbar">
                    <span class="live-status-pill"
                          th:classappend="${liveSession.status == 'ON_AIR'} ? ' is-onair'"
                          th:text="${liveStatusLabel}">방송중</span>
                    <span class="live-viewers">시청자 <strong id="liveViewerCount" th:text="${viewerCount}">0</strong></span>
                </div>
                <div class="live-dummy-stream"
                     th:with="cacheVersion=${liveSession.cacheVersion != null ? liveSession.cacheVersion : 1}">
                    <video autoplay muted loop playsinline preload="metadata" controls>
                        <source th:src="${liveSession.videoUrl != null and !#strings.isEmpty(#strings.trim(liveSession.videoUrl))} ? ${liveSession.videoUrl + '?v=' + cacheVersion} : @{/videos/live/windbreaker.mp4}"
                                type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="live-product-strip">
                <div>
                    <p th:text="${product.brandName != null and !product.brandName.isBlank()} ? ${product.brandName} : 'H-Insight'">H-Insight</p>
                    <h1 th:text="${liveSession.liveTitle != null and !liveSession.liveTitle.isBlank()} ? ${liveSession.liveTitle} : ${product.productName}">라이브 제목</h1>
                    <strong class="live-product-name" th:text="${product.productName}">상품명</strong>
                    <span class="live-message"
                          th:if="${liveSession.liveMessage != null and !liveSession.liveMessage.isBlank()}"
                          th:text="${liveSession.liveMessage}">라이브 소개 문구</span>
                </div>
                <a class="live-product-link"
                   th:href="@{/customer/products/{id}(id=${product.productId})}">상품 보기</a>
            </div>
        </section>

        <aside class="live-side">
            <section class="live-chat-panel">
                <div class="live-panel-head">
                    <h2>채팅</h2>
                    <button type="button" class="live-bot-btn" id="liveBotBtn" hidden>
                        🤖 리뷰봇 답변 <span class="live-bot-badge" id="liveBotBadge">0</span>
                    </button>
                </div>
                <div class="live-bot-toast" id="liveBotToast">
                    <div class="live-bot-toast-head">🤖 리뷰봇 답변</div>
                    <div class="live-bot-toast-q" id="liveBotToastQ"></div>
                    <div class="live-bot-toast-a" id="liveBotToastA"></div>
                </div>
                <div class="live-chat-list" id="liveChatList"></div>
                <form class="live-chat-form" id="liveChatForm">
                    <input type="text" id="liveChatInput" placeholder="메시지를 입력하세요" autocomplete="off">
                    <button type="submit">전송</button>
                </form>
            </section>
        </aside>

        <div class="live-bot-modal-overlay" id="liveBotModal" hidden>
            <div class="live-bot-modal">
                <div class="live-bot-modal-head">
                    <span>🤖 리뷰봇 답변 기록</span>
                    <button type="button" class="live-bot-modal-close" id="liveBotModalClose" aria-label="닫기">✕</button>
                </div>
                <div class="live-bot-modal-body" id="liveBotModalBody"></div>
                <div class="live-bot-modal-foot" id="liveBotModalFoot" hidden></div>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const room = document.querySelector('.live-room');
            if (!room) return;

            const liveSessionId = room.dataset.liveSessionId;
            const viewerCount = document.getElementById('liveViewerCount');
            const chatForm = document.getElementById('liveChatForm');
            const chatInput = document.getElementById('liveChatInput');
            const chatList = document.getElementById('liveChatList');
            const botBtn = document.getElementById('liveBotBtn');
            const botBadge = document.getElementById('liveBotBadge');
            const botModal = document.getElementById('liveBotModal');
            const botModalBody = document.getElementById('liveBotModalBody');
            const botModalFoot = document.getElementById('liveBotModalFoot');
            const botModalClose = document.getElementById('liveBotModalClose');
            const botToast = document.getElementById('liveBotToast');
            const botToastQ = document.getElementById('liveBotToastQ');
            const botToastA = document.getElementById('liveBotToastA');

            // 리뷰봇 답변: 스트림에 안 쌓고 팝업(모달)에 Q/A 기록으로 모아 보여줌
            const botAnswers = []; // {question, message, sentAt}

            const fmtTime = (ms) => {
                const d = ms ? new Date(ms) : new Date();
                return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            };

            // Q/A 한 쌍을 카드로 생성 (질문·답변을 배지로 명확히 구분)
            const makeItem = (a) => {
                const item = document.createElement('div');
                item.className = 'live-bot-item';

                const q = document.createElement('div');
                q.className = 'live-bot-item-q';
                const qTag = document.createElement('span');
                qTag.className = 'live-bot-tag q';
                qTag.textContent = 'Q';
                const qText = document.createElement('span');
                qText.textContent = a.question || '(질문 없음)';
                q.append(qTag, qText);

                const body = document.createElement('div');
                body.className = 'live-bot-item-a';
                const aTag = document.createElement('span');
                aTag.className = 'live-bot-tag a';
                aTag.textContent = 'A';
                const aText = document.createElement('span');
                aText.textContent = a.message || '';
                body.append(aTag, aText);

                const time = document.createElement('div');
                time.className = 'live-bot-item-time';
                time.textContent = fmtTime(a.sentAt);

                item.append(q, body, time);
                return item;
            };

            const PAGE_SIZE = 5;
            let botPage = 0; // 0 = 최신 페이지

            const renderBotModal = () => {
                botModalBody.innerHTML = '';
                if (botAnswers.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'live-bot-empty';
                    empty.textContent = '아직 리뷰봇 답변이 없어요.';
                    botModalBody.appendChild(empty);
                    botModalFoot.hidden = true;
                    return;
                }
                const list = botAnswers.slice().reverse(); // 최신순
                const totalPages = Math.ceil(list.length / PAGE_SIZE);
                botPage = Math.min(Math.max(botPage, 0), totalPages - 1);
                const start = botPage * PAGE_SIZE;
                list.slice(start, start + PAGE_SIZE).forEach((a) => botModalBody.appendChild(makeItem(a)));
                botModalBody.scrollTop = 0;

                if (totalPages <= 1) { botModalFoot.hidden = true; return; }
                botModalFoot.hidden = false;
                botModalFoot.innerHTML = '';
                const prev = document.createElement('button');
                prev.className = 'live-bot-page-btn';
                prev.textContent = '이전';
                prev.disabled = botPage === 0;
                prev.addEventListener('click', () => { botPage--; renderBotModal(); });
                const info = document.createElement('span');
                info.className = 'live-bot-page-info';
                info.textContent = `${botPage + 1} / ${totalPages}`;
                const next = document.createElement('button');
                next.className = 'live-bot-page-btn';
                next.textContent = '다음';
                next.disabled = botPage >= totalPages - 1;
                next.addEventListener('click', () => { botPage++; renderBotModal(); });
                botModalFoot.append(prev, info, next);
            };

            const openBotModal = () => {
                botPage = 0; // 열 때 최신 페이지부터
                renderBotModal();
                botModal.hidden = false;
                botBtn.classList.remove('has-new'); // 확인했으니 새 답변 표시 해제
            };
            const closeBotModal = () => { botModal.hidden = true; };

            // 새 답변을 상단에 몇 초간 토스트로 알림
            let botToastTimer = null;
            const showBotToast = (a) => {
                botToastQ.textContent = a.question ? `Q. ${a.question}` : '';
                botToastA.textContent = a.message || '';
                botToast.classList.add('show');
                if (botToastTimer) clearTimeout(botToastTimer);
                botToastTimer = setTimeout(() => botToast.classList.remove('show'), 7000);
            };
            botToast.addEventListener('click', () => { botToast.classList.remove('show'); openBotModal(); });

            // isLive=true(실시간 도착)일 때만 토스트/펄스. 입장 시 과거기록 로드는 조용히 누적만.
            const recordBotAnswer = (msg, isLive) => {
                botAnswers.push({ question: msg.question, message: msg.message, sentAt: msg.sentAt });
                botBtn.hidden = false;
                botBadge.textContent = botAnswers.length;
                if (!botModal.hidden) renderBotModal(); // 열려있으면 실시간 갱신
                if (isLive) {
                    botBtn.classList.add('has-new'); // 버튼 펄스
                    showBotToast(msg);               // 상단 토스트
                }
            };

            botBtn.addEventListener('click', openBotModal);
            botModalClose.addEventListener('click', closeBotModal);
            botModal.addEventListener('click', (e) => { if (e.target === botModal) closeBotModal(); }); // 배경 클릭 닫기

            const updateStatus = async (url, options = {}) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) return;
                    const data = await response.json();
                    if (viewerCount && typeof data.viewerCount === 'number') {
                        viewerCount.textContent = data.viewerCount.toLocaleString('ko-KR');
                    }
                } catch (error) {
                    console.warn('[LIVE] status update failed', error);
                }
            };

            updateStatus(`/live/${liveSessionId}/viewers/enter`, { method: 'POST' });
            const poll = window.setInterval(() => updateStatus(`/live/${liveSessionId}/status`), 3000);

            let myId = null;

            const appendMessage = (msg) => {
                // 리뷰봇 답변은 스트림에 안 쌓고 팝업 기록 + 실시간 토스트
                if (msg.type === 'BOT') {
                    recordBotAnswer(msg, true);
                    return;
                }

                const node = document.createElement('div');
                node.className = 'live-chat-message';
                if (msg.senderId && msg.senderId === myId) {
                    node.classList.add('is-me');
                }
                const who = document.createElement('strong');
                who.textContent = msg.sender || '게스트';
                const body = document.createElement('span');
                body.textContent = msg.message;
                node.append(who, body);
                chatList.appendChild(node);
                chatList.scrollTop = chatList.scrollHeight;
            };

            const loadHistory = async () => {
                try {
                    const response = await fetch(`/live/${liveSessionId}/chat/history`);
                    if (!response.ok) return;
                    const history = await response.json();

                    history.forEach((msg) => {
                        if (msg.type === 'BOT') return;
                        appendMessage(msg);
                    });
                } catch (error) {
                    console.warn('[LIVE] chat history load failed', error);
                }
            };

            // 리뷰봇 답변 과거기록을 불러와 공지 보드에 채운다(오래된 순 → 최신이 마지막에 상단 표시)
            const loadBotAnswers = async () => {
                try {
                    const response = await fetch(`/live/${liveSessionId}/bot-answers`);
                    if (!response.ok) return;
                    const answers = await response.json();
                    answers.forEach((a) => recordBotAnswer(a, false));
                } catch (error) {
                    console.warn('[LIVE] bot answers load failed', error);
                }
            };

            const stompClient = new StompJs.Client({
                webSocketFactory: () => new SockJS('/ws-live'),
                reconnectDelay: 3000,
                onConnect: async (frame) => {
                    myId = frame.headers['user-name'] || null;
                    await loadHistory();
                    await loadBotAnswers();
                    stompClient.subscribe(`/topic/live/${liveSessionId}`, (message) => {
                        appendMessage(JSON.parse(message.body));
                    });
                },
                onStompError: (frame) => console.warn('[LIVE] stomp error', frame.headers['message']),
            });
            stompClient.activate();

            chatForm.addEventListener('submit', (event) => {
                event.preventDefault();
                const message = chatInput.value.trim();
                if (!message || !stompClient.connected) return;
                stompClient.publish({
                    destination: `/app/live/${liveSessionId}/chat`,
                    body: JSON.stringify({ message }),
                });
                chatInput.value = '';
            });

            window.addEventListener('pagehide', () => {
                window.clearInterval(poll);
                stompClient.deactivate();
                navigator.sendBeacon(`/live/${liveSessionId}/viewers/leave`, new Blob([], { type: 'application/json' }));
            });
        });
    </script>
</th:block>
</html>

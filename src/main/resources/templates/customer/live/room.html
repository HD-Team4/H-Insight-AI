<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<th:block layout:fragment="content">
    <div class="live-room" th:data-live-session-id="${liveSession.liveSessionId}">
        <section class="live-stage">
            <div class="live-video-shell">
                <div class="live-video-topbar">
                    <span class="live-status-pill"
                          th:classappend="${liveSession.status == 'ON_AIR'} ? ' is-onair'"
                          th:text="${liveStatusLabel}">방송중</span>
                    <span class="live-viewers">시청자 <strong id="liveViewerCount" th:text="${viewerCount}">0</strong></span>
                </div>
                <div class="live-dummy-stream"
                     th:with="cacheVersion=${liveSession.cacheVersion != null ? liveSession.cacheVersion : 1}">
                    <video autoplay muted loop playsinline preload="metadata" controls>
                        <source th:src="${liveSession.videoUrl != null and !#strings.isEmpty(#strings.trim(liveSession.videoUrl))} ? ${liveSession.videoUrl + '?v=' + cacheVersion} : @{/videos/live/windbreaker.mp4}"
                                type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="live-product-strip">
                <div>
                    <p th:text="${product.brandName != null and !product.brandName.isBlank()} ? ${product.brandName} : 'H-Insight'">H-Insight</p>
                    <h1 th:text="${liveSession.liveTitle != null and !liveSession.liveTitle.isBlank()} ? ${liveSession.liveTitle} : ${product.productName}">라이브 제목</h1>
                    <strong class="live-product-name" th:text="${product.productName}">상품명</strong>
                    <span class="live-message"
                          th:if="${liveSession.liveMessage != null and !liveSession.liveMessage.isBlank()}"
                          th:text="${liveSession.liveMessage}">라이브 소개 문구</span>
                </div>
                <a class="live-product-link"
                   th:href="@{/customer/products/{id}(id=${product.productId})}">상품 보기</a>
            </div>
        </section>

        <aside class="live-side">
            <section class="live-chat-panel">
                <div class="live-panel-head">
                    <h2>채팅</h2>
                </div>
                <div class="live-chat-list" id="liveChatList"></div>
                <form class="live-chat-form" id="liveChatForm">
                    <input type="text" id="liveChatInput" placeholder="메시지를 입력하세요" autocomplete="off">
                    <button type="submit">전송</button>
                </form>
            </section>
        </aside>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const room = document.querySelector('.live-room');
            if (!room) return;

            const liveSessionId = room.dataset.liveSessionId;
            const viewerCount = document.getElementById('liveViewerCount');
            const chatForm = document.getElementById('liveChatForm');
            const chatInput = document.getElementById('liveChatInput');
            const chatList = document.getElementById('liveChatList');

            const updateStatus = async (url, options = {}) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) return;
                    const data = await response.json();
                    if (viewerCount && typeof data.viewerCount === 'number') {
                        viewerCount.textContent = data.viewerCount.toLocaleString('ko-KR');
                    }
                } catch (error) {
                    console.warn('[LIVE] status update failed', error);
                }
            };

            updateStatus(`/live/${liveSessionId}/viewers/enter`, { method: 'POST' });
            const poll = window.setInterval(() => updateStatus(`/live/${liveSessionId}/status`), 3000);

            let myId = null;

            const appendMessage = (msg) => {
                const node = document.createElement('div');
                node.className = 'live-chat-message';
                if (msg.senderId && msg.senderId === myId) {
                    node.classList.add('is-me');
                }
                const who = document.createElement('strong');
                who.textContent = msg.sender || '게스트';
                const body = document.createElement('span');
                body.textContent = msg.message;
                node.append(who, body);
                chatList.appendChild(node);
                chatList.scrollTop = chatList.scrollHeight;
            };

            const loadHistory = async () => {
                try {
                    const response = await fetch(`/live/${liveSessionId}/chat/history`);
                    if (!response.ok) return;
                    const history = await response.json();
                    history.forEach(appendMessage);
                } catch (error) {
                    console.warn('[LIVE] chat history load failed', error);
                }
            };

            const stompClient = new StompJs.Client({
                webSocketFactory: () => new SockJS('/ws-live'),
                reconnectDelay: 3000,
                onConnect: async (frame) => {
                    myId = frame.headers['user-name'] || null;
                    await loadHistory();
                    stompClient.subscribe(`/topic/live/${liveSessionId}`, (message) => {
                        appendMessage(JSON.parse(message.body));
                    });
                },
                onStompError: (frame) => console.warn('[LIVE] stomp error', frame.headers['message']),
            });
            stompClient.activate();

            chatForm.addEventListener('submit', (event) => {
                event.preventDefault();
                const message = chatInput.value.trim();
                if (!message || !stompClient.connected) return;
                stompClient.publish({
                    destination: `/app/live/${liveSessionId}/chat`,
                    body: JSON.stringify({ message }),
                });
                chatInput.value = '';
            });

            window.addEventListener('pagehide', () => {
                window.clearInterval(poll);
                stompClient.deactivate();
                navigator.sendBeacon(`/live/${liveSessionId}/viewers/leave`, new Blob([], { type: 'application/json' }));
            });
        });
    </script>
</th:block>
</html>

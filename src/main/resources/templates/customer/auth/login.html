<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<th:block layout:fragment="content">
    <div class="auth-wrap">
        <div class="auth-card">
            <h1 class="auth-title">로그인</h1>
            <p class="auth-subtitle">H-Insight-AI에 오신 것을 환영합니다</p>

            <!-- Spring Security failureUrl(?error) / 로그아웃 / 회원가입 완료 안내 -->
            <div class="auth-alert is-error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</div>
            <div class="auth-alert is-success" th:if="${param.logout}">로그아웃되었습니다.</div>
            <div class="auth-alert is-success" th:if="${param.signup}">회원가입이 완료되었습니다. 로그인해주세요.</div>

            <!-- th:action 사용 시 CSRF 토큰 자동 삽입 -->
            <form th:action="@{/customer/login}" method="post">
                <div class="auth-field">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="auth-field">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="auth-btn">로그인</button>
            </form>

            <div class="auth-links">
                <span>아직 회원이 아니신가요?</span>
                <a th:href="@{/customer/users/signup}">회원가입</a>
            </div>

            <div class="auth-divider">
                <a th:href="@{/biz/login}">기업 회원이신가요? 비즈니스 로그인 →</a>
            </div>
        </div>
    </div>
</th:block>
</html>

<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<th:block layout:fragment="content">
    <div class="container">

        <section class="live-main-preview"
                 th:if="${showLiveBroadcast and onAirLiveSessions != null and !#lists.isEmpty(onAirLiveSessions)}">
            <div class="live-main-head">
                <div>
                    <span>방송 진행 중</span>
                    <h2>지금 진행 중인 VOD 라이브</h2>
                </div>
            </div>

            <!-- 판매 개선(검색 없음 승인) 추천 슬롯 — 라이브 영상 옆에 세로로 노출 -->
            <style>
                .live-main-row { display:flex; gap:16px; align-items:stretch; }
                .live-main-row .live-main-carousel { flex:1 1 auto; min-width:0; }
                .promo-slot { flex:0 0 288px; width:288px; }

                /* ── 라이브 섹션 확대 (발표용) ──
                   비율(16/9)·object-fit:cover 는 그대로 → 잘림/검은 여백 없이 크기만 키움.
                   컨테이너(1200px) 안에선 추천슬롯 때문에 영상이 안 커지므로,
                   라이브 섹션만 좌우 대칭으로 컨테이너 밖으로 넓혀(최대 1360px) 영상을 키운다.
                   동시에 위 여백을 줄여 섹션이 위로 더 크게 올라오게 한다. */
                .live-main-preview {
                    width: min(1360px, calc(100vw - 32px));
                    margin: 18px 0 28px 50%;                     /* 상단 여백↑ → 헤더/선과 간격 확보 */
                    transform: translateX(-50%);
                    padding: 22px 0 24px;                        /* 카드 안쪽 상단 여백↑ → 배지가 위에 바짝 안 붙게 */
                    background: transparent;                     /* 흰 배경 제거 → 오프화이트 페이지에 자연스럽게 녹임 */
                }
                .live-main-head { max-width: none; }
                .live-main-carousel { max-width: none; }
                .live-main-card { grid-template-columns: minmax(0, 2.3fr) minmax(260px, 0.7fr); }
                .live-main-head h2 { font-size: 24px; }         /* 섹션 제목도 함께 키움 */
                .promo-slot-label { font-size:16px; font-weight:800; color:var(--text-main); margin-bottom:12px; }
                .promo-slot-list { display:flex; flex-direction:column; gap:12px; max-height:100%; overflow-y:auto; padding-right:2px; }
                .promo-card { display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;
                    padding:8px; border-radius:10px; }
                .promo-card:hover { background:var(--bg-light); }
                .promo-card-img { flex:0 0 76px; width:76px; height:76px; border-radius:10px; overflow:hidden; background:#f4f4f4; }
                .promo-card-img img { width:100%; height:100%; object-fit:cover; display:block; }
                .promo-card-info { min-width:0; }
                .promo-card-name { font-size:15px; font-weight:600; line-height:1.4;
                    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
                .promo-card-price { font-size:16px; font-weight:800; margin-top:4px; }
                @media (max-width:900px) {
                    .live-main-row { flex-direction:column; }
                    .promo-slot { width:100%; flex:none; }
                    .promo-slot-list { flex-direction:row; overflow-x:auto; overflow-y:visible; max-height:none; }
                    .promo-card { flex-direction:column; align-items:flex-start; flex:0 0 132px; width:132px; }
                    .promo-card-img { width:100%; height:132px; }
                }
            </style>
            <div class="live-main-row">
                <div class="live-main-carousel" id="liveMainCarousel">
                    <div class="live-main-grid">
                        <article class="live-main-card"
                                 th:each="live : ${onAirLiveSessions}">
                            <a class="live-main-video"
                               th:href="@{/live/{id}(id=${live.liveSessionId})}"
                               aria-label="라이브 방송 입장">
                                <video autoplay muted loop playsinline preload="metadata"
                                       th:with="cacheVersion=${live.cacheVersion != null ? live.cacheVersion : 1}">
                                    <source th:src="${live.videoUrl != null and !#strings.isEmpty(#strings.trim(live.videoUrl))} ? ${live.videoUrl + '?v=' + cacheVersion} : ${@environment.getProperty('app.cdn.url') + '/static/videos/live/windbreaker.mp4'}"
                                            type="video/mp4">
                                </video>
                            </a>
                            <div class="live-main-info">
                                <div class="live-main-meta">
                                    <span>ON AIR</span>
                                </div>
                                <h3 th:text="${live.liveTitle}">라이브 제목</h3>
                                <p th:if="${live.liveMessage != null and !live.liveMessage.isBlank()}"
                                   th:text="${live.liveMessage}">라이브 소개 문구</p>
                                <div class="live-main-cta">
                                    <a th:href="@{/live/{id}(id=${live.liveSessionId})}">방송 보러가기</a>
                                    <div class="live-main-controls">
                                        <button type="button" class="live-scroll-btn" data-live-scroll="prev" aria-label="이전 라이브">‹</button>
                                        <button type="button" class="live-scroll-btn" data-live-scroll="next" aria-label="다음 라이브">›</button>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>
                </div>

                <div class="promo-slot" th:if="${promotedProducts != null and !#lists.isEmpty(promotedProducts)}">
                    <div class="promo-slot-label">✨ H-Insight 추천 픽</div>
                    <div class="promo-slot-list">
                        <a class="promo-card" th:each="p : ${promotedProducts}"
                           th:href="@{/customer/products/{id}(id=${p.productId})}">
                            <div class="promo-card-img">
                                <img th:if="${p.imageUrl}" th:src="${p.imageUrl}" th:alt="${p.productName}">
                            </div>
                            <div class="promo-card-info">
                                <div class="promo-card-name" th:text="${p.productName}">상품명</div>
                                <div class="promo-card-price" th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + '원'">0원</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <div class="filter-bar">
            <nav class="category-nav">
                <a th:href="@{/customer/products(keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == null} ? 'active'">전체</a>
                <a th:href="@{/customer/products(categoryGroup='TOP', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'TOP'} ? 'active'">상의</a>
                <a th:href="@{/customer/products(categoryGroup='BOTTOM', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'BOTTOM'} ? 'active'">하의</a>
                <a th:href="@{/customer/products(categoryGroup='OUTER', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'OUTER'} ? 'active'">아우터</a>
                <a th:href="@{/customer/products(categoryGroup='ACCESSORY', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'ACCESSORY'} ? 'active'">악세서리</a>
            </nav>

            <div class="price-filter">
                <input type="number" id="minPriceInput" class="price-input" placeholder="최소 금액" min="0"
                       th:value="${condition.minPrice()}"/>
                <span class="price-divider">~</span>
                <input type="number" id="maxPriceInput" class="price-input" placeholder="최대 금액" min="0"
                       th:value="${condition.maxPrice()}"/>
                <button type="button" class="price-apply-btn" onclick="applyPriceFilter()">적용</button>
                <a th:href="@{/customer/products}" class="price-reset-btn">필터 초기화</a>
            </div>
        </div>

        <!-- 🔥 실시간 급상승 (Kafka→Redis 스피드 레이어, 최근 1시간 롤링) — 가로 상품 카드 행 -->
        <style>
            .hot-trend { margin: 40px 0 8px; }
            .hot-trend .section-title { margin: 0 0 4px; }
            .hot-trend .hot-sub { font-size: 13px; color: var(--text-sub); margin: 0 0 6px; }
            .hot-row-label { font-size:16px; font-weight:700; margin: 22px 0 12px; }
            .hot-row { display:flex; gap:14px; overflow-x:auto; padding-bottom:10px; scroll-snap-type:x proximity; }
            .hot-row::-webkit-scrollbar { height:6px; }
            .hot-row::-webkit-scrollbar-thumb { background:#dcdcdc; border-radius:3px; }
            .hot-card { flex:0 0 156px; width:156px; text-decoration:none; color:inherit; scroll-snap-align:start; }
            .hot-card-img { position:relative; width:156px; height:156px; border-radius:12px; overflow:hidden; background:#f4f4f4; }
            .hot-card-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s ease; }
            .hot-card:hover .hot-card-img img { transform:scale(1.05); }
            .hot-rank { position:absolute; top:8px; left:8px; min-width:24px; height:24px; padding:0 6px; border-radius:7px;
                        background:rgba(0,0,0,.72); color:#fff; font-size:14px; font-weight:800; display:flex; align-items:center; justify-content:center; }
            .hot-card:nth-child(-n+3) .hot-rank { background:var(--primary); }
            .hot-card-name { font-size:13px; margin-top:9px; font-weight:600; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
            .hot-card-price { font-size:14px; font-weight:800; margin-top:3px; }
            .hot-card-metric { font-size:11px; color:var(--text-sub); margin-top:4px; }
            .hot-empty { color:var(--text-sub); font-size:13px; padding:8px 2px; }
            @media (max-width:700px){ .hot-card,.hot-card-img{flex-basis:132px; width:132px;} .hot-card-img{height:132px;} }
        </style>
        <section class="hot-trend" id="hotTrend" style="display:none">
            <h2 class="section-title">🔥 실시간 급상승</h2>
            <p class="hot-sub">최근 1시간 실시간 집계 · <span id="hotAt">–</span> 기준</p>

            <div class="hot-row-label">👁 지금 많이 보는 상품</div>
            <div class="hot-row" id="hotViews"></div>

            <div class="hot-row-label">🛒 지금 많이 팔리는 상품</div>
            <div class="hot-row" id="hotSales"></div>
        </section>

        <h2 class="section-title" th:if="${condition.categoryGroup() == null}">
            전체 상품
        </h2>

        <p class="did-you-mean"
           th:if="${searchResult != null and searchResult.corrected}"
           style="margin: 8px 0 16px; color: #555;">
            <span th:text="|'${searchResult.originalKeyword}'|">'검색어'</span>
            검색 결과가 없어
            <strong th:text="|'${searchResult.correctedKeyword}'|">'교정어'</strong>
            (으)로 검색한 결과를 보여드릴게요
        </p>

        <div class="product-grid" id="product-grid"
             th:unless="${#lists.isEmpty(products)}"
             th:attr="data-page=${searchResult.page().page()}, data-total-pages=${searchResult.page().totalPages()}">
            <th:block th:replace="~{customer/product/fragments/product-cards :: cards}"></th:block>
        </div>

        <!-- 무한스크롤 감지용 sentinel -->
        <div id="scroll-sentinel" th:unless="${#lists.isEmpty(products)}" style="height: 1px;"></div>

        <div th:if="${#lists.isEmpty(products)}" class="empty-result">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
            <p class="empty-title">조건에 맞는 상품이 없어요</p>
            <p class="empty-desc">검색어나 필터 조건을 바꿔보세요.</p>
            <a th:href="@{/customer/products}" class="empty-reset-btn">필터 초기화</a>
        </div>

    </div>

    <script>
        // 🔥 실시간 급상승: /api/hot-trends 를 5초마다 폴링 (Kafka→Redis 스피드 레이어)
        (function () {
            const box = document.getElementById('hotTrend');
            if (!box) return;
            function esc(s) {
                return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }
            function render(el, items, kind) {
                el.innerHTML = (items || []).map(function (it) {
                    const name = esc(it.name);
                    const price = (it.price || 0).toLocaleString('ko-KR');
                    const cnt = (it.count || 0).toLocaleString('ko-KR');
                    const metric = kind === 'view' ? '👁 ' + cnt + '회 조회' : '🛒 ' + cnt + '개 판매';
                    return '<a class="hot-card" href="/customer/products/' + it.productId + '">' +
                        '<div class="hot-card-img"><span class="hot-rank">' + it.rank + '</span>' +
                        '<img src="' + esc(it.imageUrl) + '" alt="' + name + '" loading="lazy"></div>' +
                        '<div class="hot-card-name">' + name + '</div>' +
                        '<div class="hot-card-price">' + price + '원</div>' +
                        '<div class="hot-card-metric">' + metric + '</div></a>';
                }).join('') || '<div class="hot-empty">아직 데이터가 없어요</div>';
            }
            async function poll() {
                try {
                    const res = await fetch('/api/hot-trends');
                    if (!res.ok) return;
                    const d = await res.json();
                    const has = (d.views && d.views.length) || (d.sales && d.sales.length);
                    box.style.display = has ? '' : 'none';
                    if (!has) return;
                    render(document.getElementById('hotViews'), d.views, 'view');
                    render(document.getElementById('hotSales'), d.sales, 'sale');
                    document.getElementById('hotAt').textContent =
                        new Date(d.generatedAt).toLocaleTimeString('ko-KR');
                } catch (e) { /* 무시 */ }
            }
            poll();
            setInterval(poll, 5000);
        })();
    </script>

    <script th:inline="javascript">
        (function () {
            const minInput = document.getElementById('minPriceInput');
            const maxInput = document.getElementById('maxPriceInput');

            window.applyPriceFilter = function () {
                const params = new URLSearchParams(window.location.search);

                const min = minInput.value.trim();
                const max = maxInput.value.trim();

                if (min !== '') { params.set('minPrice', min); } else { params.delete('minPrice'); }
                if (max !== '') { params.set('maxPrice', max); } else { params.delete('maxPrice'); }

                window.location.href = '/customer/products?' + params.toString();
            };

            [minInput, maxInput].forEach(function (el) {
                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') { applyPriceFilter(); }
                });
            });

            const liveCarousel = document.getElementById('liveMainCarousel');
            const liveScrollButtons = document.querySelectorAll('[data-live-scroll]');
            liveScrollButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    if (!liveCarousel) return;
                    const direction = button.dataset.liveScroll === 'prev' ? -1 : 1;
                    liveCarousel.scrollBy({
                        left: direction * liveCarousel.clientWidth,
                        behavior: 'smooth'
                    });
                });
            });
        })();
    </script>

    <script>
        // 무한스크롤: sentinel 이 보이면 다음 페이지 카드를 fetch 하여 grid 에 append
        (function () {
            const grid = document.getElementById('product-grid');
            const sentinel = document.getElementById('scroll-sentinel');
            if (!grid || !sentinel) return;

            let currentPage = parseInt(grid.dataset.page || '1', 10);
            const totalPages = parseInt(grid.dataset.totalPages || '1', 10);
            let loading = false;

            if (currentPage >= totalPages) return;

            const observer = new IntersectionObserver(function (entries) {
                if (entries[0].isIntersecting && !loading && currentPage < totalPages) {
                    loadMore();
                }
            }, { rootMargin: '300px' });
            observer.observe(sentinel);

            async function loadMore() {
                loading = true;
                const params = new URLSearchParams(window.location.search);
                params.set('page', currentPage + 1);
                try {
                    const res = await fetch('/customer/products/items?' + params.toString());
                    if (!res.ok) throw new Error('load failed: ' + res.status);
                    const html = await res.text();
                    grid.insertAdjacentHTML('beforeend', html);
                    currentPage += 1;
                    if (currentPage >= totalPages) observer.unobserve(sentinel);
                } catch (e) {
                    console.error('[무한스크롤] 추가 로드 실패', e);
                } finally {
                    loading = false;
                }
            }
        })();
    </script>
</th:block>
</html>

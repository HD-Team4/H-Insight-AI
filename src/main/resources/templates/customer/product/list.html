<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<th:block layout:fragment="content">
    <div class="container">

        <div class="filter-bar">
            <nav class="category-nav">
                <a th:href="@{/products(keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == null} ? 'active'">전체</a>
                <a th:href="@{/products(categoryGroup='TOP', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'TOP'} ? 'active'">상의</a>
                <a th:href="@{/products(categoryGroup='BOTTOM', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'BOTTOM'} ? 'active'">하의</a>
                <a th:href="@{/products(categoryGroup='OUTER', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'OUTER'} ? 'active'">아우터</a>
                <a th:href="@{/products(categoryGroup='ACCESSORY', keyword=${condition.keyword()}, minPrice=${condition.minPrice()}, maxPrice=${condition.maxPrice()})}"
                   class="category-tab"
                   th:classappend="${condition.categoryGroup() == 'ACCESSORY'} ? 'active'">악세서리</a>
            </nav>

            <div class="price-filter">
                <input type="number" id="minPriceInput" class="price-input" placeholder="최소 금액" min="0"
                       th:value="${condition.minPrice()}"/>
                <span class="price-divider">~</span>
                <input type="number" id="maxPriceInput" class="price-input" placeholder="최대 금액" min="0"
                       th:value="${condition.maxPrice()}"/>
                <button type="button" class="price-apply-btn" onclick="applyPriceFilter()">적용</button>
            </div>
        </div>

        <h2 class="section-title" th:if="${condition.categoryGroup() == null}">
            H-Insight 추천 픽
        </h2>

        <div class="product-grid">
            <a th:each="product : ${products}"
               th:href="@{/products/{id}(id=${product.productId})}"
               class="product-card">

                <div class="product-img">
                    <img th:if="${product.imageUrl}"
                         th:src="${product.imageUrl}"
                         th:alt="${product.productName}"
                         style="width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 12px;"/>
                </div>

                <div class="product-info">
                    <div class="product-name" th:text="${product.productName}">상품명</div>
                    <div class="product-price" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</div>
                </div>
            </a>

            <div th:if="${#lists.isEmpty(products)}" class="empty-result">
                조건에 맞는 상품이 없습니다.
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        (function () {
            const minInput = document.getElementById('minPriceInput');
            const maxInput = document.getElementById('maxPriceInput');

            window.applyPriceFilter = function () {
                const params = new URLSearchParams(window.location.search);

                const min = minInput.value.trim();
                const max = maxInput.value.trim();

                if (min !== '') { params.set('minPrice', min); } else { params.delete('minPrice'); }
                if (max !== '') { params.set('maxPrice', max); } else { params.delete('maxPrice'); }

                window.location.href = '/products?' + params.toString();
            };

            [minInput, maxInput].forEach(function (el) {
                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') { applyPriceFilter(); }
                });
            });
        })();
    </script>
</th:block>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰에도 유통기한이 있어요 · 지수 감쇠</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
    <style>
        :root {
            --bg: #0b1220; --panel: #121b2e; --panel-2: #0f1728; --line: #23324f;
            --text: #e7eefc; --muted: #8ea2c6; --accent: #34c759; --danger: #ff5470;
            --edge: #35507e; --amber: #ffc24b; --curve: #4fd1e0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: "Pretendard", -apple-system, system-ui, sans-serif;
            background: radial-gradient(1200px 600px at 60% -10%, #16233d 0%, var(--bg) 55%);
            color: var(--text); min-height: 100vh;
        }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 40px 24px 72px; }

        /* 헤더 */
        header { text-align: center; margin-bottom: 32px; }
        header h1 { margin: 0 0 10px; font-size: 32px; letter-spacing: -0.6px; }
        header h1 .em { color: var(--curve); }
        header p { margin: 0 auto; color: var(--muted); font-size: 16px; line-height: 1.6; max-width: 620px; }
        .nav { margin-top: 16px; font-size: 13px; }
        .nav a { color: var(--edge); text-decoration: none; margin: 0 8px; }
        .nav a:hover { color: var(--text); }

        .card {
            background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
            border: 1px solid var(--line); border-radius: 16px; padding: 24px;
        }

        /* 신선도 곡선 */
        .hero { margin-bottom: 22px; }
        .hero-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .hero-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 12px; }
        .viz-wrap { overflow-x: auto; }
        svg text { font-family: inherit; }

        /* 세 줄 결론 카드 */
        .compare-title { text-align: center; font-size: 18px; font-weight: 700; margin: 6px 0 4px; }
        .compare-sub { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 18px; }
        .cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        @media (max-width: 820px) { .cards { grid-template-columns: 1fr; } }
        .rcard { background: #0c1424; border: 1px solid var(--line); border-radius: 14px; padding: 18px; text-align: center; }
        .rcard.win { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(52,199,89,.25) inset; }
        .rcard .way { font-size: 13px; color: var(--muted); }
        .rcard .emoji { font-size: 40px; margin: 8px 0 6px; line-height: 1; }
        .rcard .pick { font-size: 15px; font-weight: 700; margin-bottom: 4px; min-height: 42px; display: flex; align-items: center; justify-content: center; }
        .rcard .verdict { font-size: 13px; line-height: 1.5; }
        .rcard.bad .verdict { color: #ffa9b7; }
        .rcard.win .verdict { color: #9ff0bb; }
        .rcard .badge { display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 999px; }
        .rcard.bad .badge { background: rgba(255,84,112,.15); color: #ff8a9c; }
        .rcard.win .badge { background: rgba(52,199,89,.16); color: var(--accent); }

        /* 토글 */
        .toggle-wrap { text-align: center; margin-top: 26px; }
        .toggle {
            background: #142138; border: 1px solid var(--line); color: var(--muted);
            font-size: 14px; font-weight: 600; padding: 11px 20px; border-radius: 999px; cursor: pointer; transition: .15s;
        }
        .toggle:hover { color: var(--text); border-color: var(--edge); }

        /* 자세히(기술) */
        .details { margin-top: 20px; }
        .details.hidden { display: none; }
        .details h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px; }
        .formula {
            display: block; font-size: 16px; color: var(--text); text-align: center;
            background: #0c1424; border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px;
        }
        .formula b { color: var(--amber); }
        .dgrid { display: grid; grid-template-columns: 300px 1fr; gap: 18px; }
        @media (max-width: 860px) { .dgrid { grid-template-columns: 1fr; } }
        /* 세그먼트 버튼 */
        .seg { display: inline-flex; gap: 6px; flex-wrap: wrap; }
        .seg button {
            background: #0c1424; border: 1px solid var(--line); color: var(--muted);
            font-size: 14px; font-weight: 600; padding: 9px 15px; border-radius: 10px; cursor: pointer; transition: .12s;
        }
        .seg button:hover { color: var(--text); border-color: var(--edge); }
        .seg button.active { background: rgba(79,209,224,.16); border-color: var(--curve); color: #bff0f6; }
        /* 쉬운 화면의 반감기 선택 */
        .pick-half { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 8px; }
        .pick-half .pick-label { font-size: 15px; color: var(--muted); }
        .pick-half .seg button { font-size: 15px; padding: 10px 18px; }
        /* 자세히 파라미터 */
        .param { margin: 16px 0; }
        .param > label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
        .kpi { margin-top: 18px; }
        .kpi .row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px dashed #1b2740; }
        .kpi .row:last-child { border-bottom: 0; }
        .kpi .row .d { color: var(--muted); } .kpi .row .w { font-weight: 800; color: var(--amber); }
        table.rank { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.rank th { color: var(--muted); font-weight: 600; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); font-size: 12px; }
        table.rank td { padding: 6px 8px; border-bottom: 1px solid #131f36; }
        table.rank td.sc { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
        .cdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .excluded { font-size: 12px; color: var(--muted); margin-top: 10px; }
        .excluded .chip { display: inline-block; background: #131f36; border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; margin: 3px 4px 0 0; color: #6a7ea3; text-decoration: line-through; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>리뷰에도 <span class="em">유통기한</span>이 있어요</h1>
        <p>오래된 리뷰일수록 살살 덜 믿습니다. 그래야 검색 결과에 <b>지금도 맞는 최신 정보</b>가 올라와요.</p>
        <div class="nav"><a href="/demo/guard">1차 방어</a>·<a href="/demo/semantic">2차 방어</a>·<a href="/demo/decay">3. 필터링</a></div>
    </header>

    <!-- 쉬운 화면 -->
    <div class="card">
        <div class="hero">
            <div class="hero-title">오래될수록 리뷰의 신뢰도가 줄어들어요</div>
            <div class="viz-wrap" id="simpleWrap"><div style="padding:60px;text-align:center;color:var(--muted)">그리는 중…</div></div>
            <div class="pick-half">
                <span class="pick-label">리뷰를 얼마나 오래 믿을까?</span>
                <div class="seg" id="halfSeg">
                    <button data-v="30">1개월</button>
                    <button data-v="90" class="active">3개월</button>
                    <button data-v="180">6개월</button>
                    <button data-v="365">1년</button>
                </div>
            </div>
        </div>

        <div class="compare-title">그래서 검색 결과가 이렇게 달라져요</div>
        <div class="cards" id="cards"></div>

        <div class="toggle-wrap">
            <button class="toggle" id="toggleBtn">🔬 자세히 보기 (수식 · 파라미터 · 전체 순위)</button>
        </div>

        <!-- 자세히(기술) -->
        <div class="details hidden" id="details">
            <div class="formula">
                w(t) = 2<sup>−Δt / h</sup> = 0.5<sup>Δt / h</sup> &nbsp;·&nbsp;
                finalScore = <b>w<sub>sim</sub></b>·유사도 + <b>w<sub>rec</sub></b>·w(t)
            </div>
            <div class="dgrid">
                <div>
                    <h2>파라미터</h2>
                    <div class="param">
                        <label>점수 비중 (유사도 ↔ 최신성)</label>
                        <div class="seg" id="wSeg">
                            <button data-v="0.4">최신 중시</button>
                            <button data-v="0.6" class="active">균형</button>
                            <button data-v="0.75">유사도 중시</button>
                        </div>
                    </div>
                    <div class="param">
                        <label>오래된 리뷰 제외</label>
                        <div class="seg" id="cutSeg">
                            <button data-v="400" class="active">제외 없음</button>
                            <button data-v="180">6개월 이전</button>
                            <button data-v="90">3개월 이전</button>
                        </div>
                    </div>
                    <div class="kpi" id="kpi"></div>
                </div>
                <div>
                    <h2>전체 후보 · 하이브리드 점수순</h2>
                    <table class="rank"><thead><tr><th>리뷰</th><th style="text-align:right">유사도</th><th style="text-align:right">경과일</th><th style="text-align:right">신선도</th><th style="text-align:right">최종점수</th></tr></thead>
                        <tbody id="rankBody"></tbody></table>
                    <div class="excluded" id="excluded"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="none">
(function () {
    "use strict";
    var PALETTE = ["#5b8cff", "#34c759", "#ffa53c", "#c77dff", "#ff6b9d", "#3ec9c9", "#ff8a65", "#e0c341"];
    var colorOf = {};

    function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function short(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }

    // ---------- 쉬운 신선도 곡선 ----------
    function renderSimple(data) {
        var W = 900, H = 300, ml = 58, mr = 30, mt = 24, mb = 52;
        var pw = W - ml - mr, ph = H - mt - mb;
        var maxD = 365;
        function sx(day) { return ml + (Math.min(day, maxD) / maxD) * pw; }
        function sy(w) { return mt + (1 - w) * ph; }

        var s = "";
        s += '<defs><linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">'
           + '<stop offset="0" stop-color="#4fd1e0" stop-opacity="0.35"/>'
           + '<stop offset="1" stop-color="#4fd1e0" stop-opacity="0"/></linearGradient></defs>';

        // Y 라벨 (신뢰도 %)
        [[1, "100%"], [0.5, "50%"], [0, "0%"]].forEach(function (p) {
            var y = sy(p[0]);
            s += '<line x1="' + ml + '" y1="' + y + '" x2="' + (W - mr) + '" y2="' + y + '" stroke="#14223c" stroke-width="1"/>';
            s += '<text x="' + (ml - 10) + '" y="' + (y + 4) + '" text-anchor="end" fill="#6a7ea3" font-size="13">' + p[1] + '</text>';
        });
        // X 라벨 (말로)
        [[0, "오늘"], [90, "3개월"], [180, "6개월"], [365, "1년 전"]].forEach(function (p) {
            var x = sx(p[0]);
            s += '<text x="' + x + '" y="' + (mt + ph + 24) + '" text-anchor="middle" fill="#7d8fb3" font-size="13">' + p[1] + '</text>';
        });

        // 곡선 (실제 데이터, 365일까지)
        var pts = data.curve.filter(function (p) { return p.day <= maxD; });
        var line = "", area = "";
        pts.forEach(function (p, i) {
            var X = sx(p.day).toFixed(1), Y = sy(p.weight).toFixed(1);
            line += (i === 0 ? "M" : "L") + X + "," + Y;
        });
        area = line + "L" + sx(maxD) + "," + sy(0) + "L" + sx(0) + "," + sy(0) + "Z";
        s += '<path d="' + area + '" fill="url(#fade)"/>';
        s += '<path d="' + line + '" fill="none" stroke="#4fd1e0" stroke-width="3.5" stroke-linecap="round"/>';

        // 90일 = 50% 강조
        var hx = sx(data.halfLifeDays), hy = sy(0.5);
        if (data.halfLifeDays <= maxD) {
            s += '<line x1="' + hx + '" y1="' + hy + '" x2="' + hx + '" y2="' + (mt + ph) + '" stroke="#ffc24b" stroke-width="1.6" stroke-dasharray="5 4"/>';
            s += '<circle cx="' + hx + '" cy="' + hy + '" r="7" fill="#ffc24b"/>';
            var flip = hx > W * 0.62;
            var gx = flip ? hx - 200 : hx + 12;
            s += '<g transform="translate(' + gx + ',' + (hy - 14) + ')">'
               + '<rect x="0" y="-16" width="188" height="26" rx="8" fill="#2a2410" stroke="#ffc24b" stroke-opacity="0.5"/>'
               + '<text x="10" y="2" fill="#ffd97a" font-size="13" font-weight="700">' + Math.round(data.halfLifeDays) + '일 지나면 → 절반만 신뢰</text></g>';
        }

        // 시작점 100% 라벨
        s += '<circle cx="' + sx(0) + '" cy="' + sy(1) + '" r="6" fill="#4fd1e0"/>';
        s += '<text x="' + (sx(0) + 12) + '" y="' + (sy(1) + 4) + '" fill="#a7e9f2" font-size="13" font-weight="700">방금 쓴 리뷰 = 100%</text>';

        document.getElementById("simpleWrap").innerHTML =
            '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">' + s + '</svg>';
    }

    // ---------- 세 줄 결론 카드 ----------
    function rankings(data) {
        var a = data.reviews.filter(function (r) { return !r.excluded; });
        return {
            recent: a.slice().sort(function (x, y) { return x.ageDays - y.ageDays; }),
            sim: a.slice().sort(function (x, y) { return y.sim - x.sim; }),
            hybrid: a.slice().sort(function (x, y) { return y.finalScore - x.finalScore; })
        };
    }

    function renderCards(data) {
        var r = rankings(data);
        var recent = r.recent[0], sim = r.sim[0], hybrid = r.hybrid[0];

        function ageWord(d) { return d <= 14 ? d + "일 전" : d < 60 ? Math.round(d / 7) + "주 전" : d < 365 ? Math.round(d / 30) + "개월 전" : "1년 전"; }

        var cards = [
            {
                cls: "bad", way: "① 최신순", emoji: "🆕",
                pick: "“" + esc(short(recent.text, 16)) + "”",
                verdict: "가장 최근 글이지만, 질문이랑 <b>별로 안 맞을 수</b> 있어요.",
                badge: "관련성 ✗"
            },
            {
                cls: "bad", way: "② 비슷한 순", emoji: "🔍",
                pick: "“" + esc(short(sim.text, 16)) + "”",
                verdict: "질문과 제일 비슷하지만 <b>" + ageWord(sim.ageDays) + "</b> 옛날 정보예요.",
                badge: "신선도 ✗"
            },
            {
                cls: "win", way: "③ 우리 방식 (신선도 반영)", emoji: "✅",
                pick: "“" + esc(short(hybrid.text, 16)) + "”",
                verdict: "<b>최근</b>이면서 질문과도 <b>잘 맞는</b> 글을 골라줘요.",
                badge: "관련성 ✓ 신선도 ✓"
            }
        ];
        document.getElementById("cards").innerHTML = cards.map(function (c) {
            return '<div class="rcard ' + c.cls + '">'
                + '<div class="way">' + c.way + '</div>'
                + '<div class="emoji">' + c.emoji + '</div>'
                + '<div class="pick">' + c.pick + '</div>'
                + '<div class="verdict">' + c.verdict + '</div>'
                + '<div class="badge">' + c.badge + '</div></div>';
        }).join("");
    }

    // ---------- 자세히(기술) ----------
    function renderDetails(data) {
        // KPI
        var kh = "";
        data.markers.forEach(function (m) {
            kh += '<div class="row"><span class="d">' + m.day + '일 경과</span><span class="w">신선도 ' + m.weight.toFixed(3) + '</span></div>';
        });
        kh += '<div class="row"><span class="d">가중치</span><span class="w">유사도 ' + data.wSim.toFixed(2) + ' · 최신성 ' + data.wRec.toFixed(2) + '</span></div>';
        document.getElementById("kpi").innerHTML = kh;

        // 순위 테이블 (하이브리드 순)
        var hybrid = rankings(data).hybrid;
        document.getElementById("rankBody").innerHTML = hybrid.map(function (r) {
            return '<tr><td><span class="cdot" style="background:' + colorOf[r.id] + '"></span>' + esc(short(r.text, 20)) + '</td>'
                + '<td class="sc">' + r.sim.toFixed(2) + '</td>'
                + '<td class="sc">' + r.ageDays + '일</td>'
                + '<td class="sc">' + r.recency.toFixed(3) + '</td>'
                + '<td class="sc" style="color:var(--text);font-weight:700">' + r.finalScore.toFixed(3) + '</td></tr>';
        }).join("");

        var ex = data.reviews.filter(function (r) { return r.excluded; });
        document.getElementById("excluded").innerHTML = ex.length
            ? "컷오프 제외: " + ex.map(function (r) { return '<span class="chip">' + esc(short(r.text, 16)) + " · " + r.ageDays + "일</span>"; }).join("")
            : "";
    }

    // ---------- 실행 ----------
    var state = { halfLife: 90, wSim: 0.6, cutoff: 400 };   // 운영 기본값

    function compute() {
        fetch("/api/cy/demo/decay/compute?halfLife=" + state.halfLife + "&wSim=" + state.wSim + "&cutoff=" + state.cutoff)
            .then(function (r) { return r.json(); })
            .then(function (j) {
                if (!j || !j.success) throw new Error("fail");
                var data = j.data;
                data.reviews.forEach(function (r) { if (!colorOf[r.id]) colorOf[r.id] = PALETTE[(r.id - 1) % PALETTE.length]; });
                renderSimple(data); renderCards(data); renderDetails(data);
            })
            .catch(function (e) {
                document.getElementById("simpleWrap").innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">계산 실패</div>';
                console.error(e);
            });
    }

    // 세그먼트 버튼 → state 갱신 후 재계산
    function wireSeg(id, key) {
        var box = document.getElementById(id);
        box.addEventListener("click", function (e) {
            var btn = e.target.closest("button");
            if (!btn || !box.contains(btn)) return;
            state[key] = Number(btn.getAttribute("data-v"));
            Array.prototype.forEach.call(box.querySelectorAll("button"), function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            compute();
        });
    }
    wireSeg("halfSeg", "halfLife");
    wireSeg("wSeg", "wSim");
    wireSeg("cutSeg", "cutoff");

    // 토글
    document.getElementById("toggleBtn").addEventListener("click", function () {
        var d = document.getElementById("details");
        var open = d.classList.toggle("hidden") === false;
        this.textContent = open ? "🔼 간단히 보기" : "🔬 자세히 보기";
    });

    compute();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM 토큰 절감 · Before / After</title>
<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<style>
    :root{
        --bg:#ffffff; --ink:#0b0d10; --muted:#5b616b; --line:#cfd4da;
        --drop:#e01e1e; --hit:#0a7d45; --clus:#1064c0;
        --색상:#1064c0; --배송:#1f8a34; --사이즈:#d9480f; --재질:#0b7285; --세탁:#9c2b6d;
        --mono:"SF Mono","JetBrains Mono","Roboto Mono",ui-monospace,monospace;
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:"Pretendard",-apple-system,system-ui,sans-serif;}
    .wrap{max-width:1200px;margin:0 auto;padding:28px 22px 46px;}
    .top{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
    h1{font-size:26px;margin:0;letter-spacing:-.6px;font-weight:800;}
    .replay{margin-left:auto;border:0;background:var(--ink);color:#fff;font-weight:800;font-size:14px;
            padding:11px 18px;border-radius:9px;cursor:pointer;}
    .replay:hover{opacity:.88;}

    .board{display:grid;grid-template-columns:1fr 130px 1fr;align-items:stretch;margin-bottom:22px;
           border-radius:18px;overflow:hidden;box-shadow:0 8px 30px rgba(11,13,16,.22);}
    .side{padding:22px 26px;color:#fff;}
    .side .tag{font-size:12px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;opacity:.72;}
    .side .calls{font-family:var(--mono);font-size:62px;font-weight:800;line-height:1;margin:8px 0 4px;}
    .side .calls small{font-size:22px;font-weight:700;opacity:.6;font-family:"Pretendard";}
    .side .tok{font-size:16px;font-weight:700;opacity:.85;}
    .side .tok b{font-family:var(--mono);}
    .before{background:#2c3137;}
    .after{background:#0b0d10;}
    .arrow{background:#17191d;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
    .arrow .a{font-size:30px;opacity:.35;line-height:1;}
    .arrow .save{margin-top:6px;font-family:var(--mono);font-size:32px;font-weight:800;color:#1ee27f;white-space:nowrap;}
    .arrow .savelbl{font-size:11px;opacity:.65;font-weight:700;margin-top:2px;}

    .stagebox{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;}
    .stage-scroll{overflow-x:auto;}
    .stage{position:relative;width:1200px;height:540px;}

    /* 단계 도형(존) — 두꺼운 테두리·고대비 */
    .zone{position:absolute;top:44px;height:472px;border-radius:16px;border:4px solid;background:#fff;transition:box-shadow .3s;}
    .zone .zl{position:absolute;top:12px;left:0;right:0;text-align:center;font-size:19px;font-weight:800;letter-spacing:-.2px;}
    .zone .zs{position:absolute;top:41px;left:0;right:0;text-align:center;font-size:12.5px;color:var(--muted);font-weight:700;}
    .zone.z-in{border-color:#0b0d10;} .zone.z-in .zl{color:#0b0d10;}
    .zone.z-guard{border-color:var(--drop);} .zone.z-guard .zl{color:var(--drop);}
    .zone.z-clus{border-color:var(--clus);} .zone.z-clus .zl{color:var(--clus);}
    .zone.z-cache{border-color:var(--hit);} .zone.z-cache .zl{color:var(--hit);}
    .zone.active{box-shadow:0 0 0 5px rgba(11,13,16,.10);}

    /* Redis (크게) */
    .redis{position:absolute;border-radius:14px;border:3px solid var(--hit);background:#fff;padding:11px 13px;}
    .redis .rt{font-size:15px;font-weight:800;color:var(--hit);text-align:center;margin-bottom:8px;}
    .rlist{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .ritem{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:800;color:var(--ink);
           background:#e8f5ee;border:1.5px solid #b6e0c8;border-radius:8px;padding:5px 9px;}
    .ritem span{color:var(--hit);font-size:14px;}
    .ritem.new{animation:store .9s ease;}
    @keyframes store{0%{transform:scale(.7);background:#0a7d45;color:#fff;}55%{background:#0a7d45;color:#fff;}100%{transform:scale(1);}}
    .ritem.flash{animation:flash .8s ease;}
    @keyframes flash{0%,100%{background:#e8f5ee;}40%{background:#7fdcac;}}

    .llmbox{position:absolute;left:1012px;top:96px;width:152px;height:250px;border-radius:14px;background:var(--ink);
            color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:.18s;
            border:3px solid var(--ink);}
    .llmbox.fire{box-shadow:0 0 0 8px rgba(11,13,16,.16);transform:scale(1.04);}
    .llmbox .t{font-weight:800;font-size:18px;}
    .llmbox .s{font-size:11.5px;opacity:.72;}

    /* 칩 */
    .chip{position:absolute;height:30px;width:152px;border-radius:8px;display:flex;align-items:center;padding:0 10px;
          font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
          box-shadow:0 2px 5px rgba(11,13,16,.20);
          transition:left .9s cubic-bezier(.45,0,.2,1),top .9s cubic-bezier(.45,0,.2,1),opacity .5s,transform .25s;z-index:6;}
    .chip .bd{margin-left:auto;background:rgba(255,255,255,.34);border-radius:20px;padding:0 7px;font-size:11px;font-weight:800;flex:none;}
    .chip .tg{position:absolute;top:-9px;right:2px;font-size:10.5px;font-weight:800;padding:1px 7px;border-radius:20px;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);z-index:8;}
    .g색상{background:var(--색상);} .g배송{background:var(--배송);} .g사이즈{background:var(--사이즈);}
    .g재질{background:var(--재질);} .g세탁{background:var(--세탁);}
    .gjunk{background:#8a9199;}
    .chip.drop .tg{background:var(--drop);}
    .chip.hit{outline:3px solid var(--hit);outline-offset:1px;}
    .chip.hit .tg{background:var(--hit);}
    .chip.miss .tg{background:var(--ink);}

    .burst{position:absolute;font-family:var(--mono);font-size:17px;font-weight:800;color:var(--ink);z-index:9;pointer-events:none;
           animation:up 1.2s ease forwards;}
    @keyframes up{0%{opacity:0;transform:translateY(8px);}25%{opacity:1;}100%{opacity:0;transform:translateY(-34px);}}
    .narr{margin:16px 2px 0;font-size:15.5px;color:var(--ink);min-height:22px;line-height:1.5;}
    .narr b{font-weight:800;}
</style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <h1>LLM 토큰 절감 · Before / After</h1>
        <button class="replay" id="replay">▶ 다시 재생</button>
    </div>

    <div class="board">
        <div class="side before">
            <div class="tag">Before · 최적화 없음</div>
            <div class="calls">20<small> 회 호출</small></div>
            <div class="tok">소비 토큰 <b>14,000</b></div>
        </div>
        <div class="arrow">
            <div class="a">›</div>
            <div class="save" id="saveNum">0%</div>
            <div class="savelbl">토큰 절감</div>
        </div>
        <div class="side after">
            <div class="tag">After · 군집화 + 캐시</div>
            <div class="calls"><span id="afterCalls">0</span><small> 회 호출</small></div>
            <div class="tok">소비 토큰 <b id="afterTok">0</b></div>
        </div>
    </div>

    <div class="stagebox">
    <div class="stage-scroll">
    <div class="stage" id="stage">
        <div class="zone z-in"    style="left:8px;width:332px;"><div class="zl">채팅 유입</div><div class="zs">20건</div></div>
        <div class="zone z-guard" id="z-guard" style="left:356px;width:168px;"><div class="zl">1차 가드</div><div class="zs">Aho-Corasick</div></div>
        <div class="zone z-clus"  id="z-clus"  style="left:544px;width:206px;"><div class="zl">의미 군집화</div><div class="zs">cos ≥ 0.85</div></div>
        <div class="zone z-cache" id="z-cache" style="left:770px;width:220px;"><div class="zl">시맨틱 캐시</div><div class="zs">cos ≥ 0.92</div>
            <div class="redis" id="redis" style="left:16px;right:16px;top:292px;bottom:14px;">
                <div class="rt">Redis 캐시 · TTL 30분</div>
                <div class="rlist" id="rlist">
                    <div class="ritem" data-g="색상">색상 <span>✓</span></div>
                    <div class="ritem" data-g="사이즈">사이즈 <span>✓</span></div>
                </div>
            </div>
        </div>
        <div class="llmbox" id="llmbox"><div class="t">Gemini</div><div class="s">호출당 ≈700토큰</div></div>
    </div>
    </div>
    </div>
    <div class="narr" id="narr"></div>
</div>

<script>
(function(){
    "use strict";
    var PER=700, BEFORE_CALLS=20, BEFORE_TOK=BEFORE_CALLS*PER;
    var XIN1=16, XIN2=176, XGUARD=364, XCL=570, XCA=804, XLLM=1008;

    var C=[
        {t:"색상 어두운가요",g:"색상"},{t:"ㅋㅋㅋㅋ",g:"junk"},
        {t:"색이 어두운 편?",g:"색상"},{t:"배송 언제 와요?",g:"배송"},
        {t:"안녕하세요~",g:"junk"},{t:"실물 색 어둡나요",g:"색상"},
        {t:"언제쯤 배송되나요?",g:"배송"},{t:"정사이즈인가요?",g:"사이즈"},
        {t:"잘 보고 있어요",g:"junk"},{t:"배송 얼마나 걸려요?",g:"배송"},
        {t:"블랙에 가깝나요?",g:"색상"},{t:"재질이 뭐예요?",g:"재질"},
        {t:"호스트 바보냐?",g:"junk"},{t:"정사이즈로 살까요?",g:"사이즈"},
        {t:"오늘 주문 언제와요?",g:"배송"},{t:"세탁 어떻게 해요?",g:"세탁"},
        {t:"🔥🔥🔥",g:"junk"},{t:"핏 크게 나왔나요?",g:"사이즈"},
        {t:"소재 어떤가요?",g:"재질"},{t:"물세탁 되나요?",g:"세탁"}
    ];
    var GROUPS={
        "색상":{rep:0, ids:[0,2,5,10], y:110},
        "배송":{rep:3, ids:[3,6,9,14], y:158},
        "사이즈":{rep:7, ids:[7,13,17], y:206},
        "재질":{rep:11,ids:[11,18], y:254},
        "세탁":{rep:15,ids:[15,19], y:302}
    };
    var REP_NAME={0:"색상",3:"배송",7:"사이즈",11:"재질",15:"세탁"};
    var JUNK=[1,4,8,12,16];
    var HIT_REP=[0,7], MISS_REP=[3,11,15];       // HIT: 색상·사이즈(사전보관) / MISS: 배송·재질·세탁
    var REP_ORDER=[0,3,7,11,15];

    var stage=document.getElementById("stage"), narr=document.getElementById("narr");
    var llmbox=document.getElementById("llmbox");
    var chips={}, runId=0, calls=0;
    var sleep=function(ms){return new Promise(function(r){setTimeout(r,ms);});};
    var alive=function(my){return my===runId;};
    function homeX(i){return i<10?XIN1:XIN2;} function homeY(i){return 110+(i%10)*28;}
    function repY(id){return GROUPS[REP_NAME[id]].y;}

    function reset(){
        Object.keys(chips).forEach(function(k){var c=chips[k];if(c.parentNode)c.parentNode.removeChild(c);});
        chips={}; calls=0;
        C.forEach(function(q,i){
            var d=document.createElement("div");
            d.className="chip g"+q.g;
            d.style.left=homeX(i)+"px"; d.style.top=homeY(i)+"px"; d.style.opacity="0";
            d.innerHTML='<span>'+q.t+'</span>';
            stage.appendChild(d); chips[i]=d;
        });
        setAfter(0);
        document.getElementById("rlist").innerHTML=
            '<div class="ritem" data-g="색상">색상 <span>✓</span></div>'+
            '<div class="ritem" data-g="사이즈">사이즈 <span>✓</span></div>';
        ["z-guard","z-clus","z-cache"].forEach(function(id){document.getElementById(id).classList.remove("active");});
    }
    function move(i,x,y){var c=chips[i];if(c){c.style.left=x+"px";c.style.top=y+"px";}}
    function fade(i){var c=chips[i];if(c)c.style.opacity="0";}
    function tag(i,cls,txt){var c=chips[i];if(c){c.classList.add(cls);var t=document.createElement("span");t.className="tg";t.textContent=txt;c.appendChild(t);}}
    function badge(i,n){var c=chips[i];if(c&&!c.querySelector(".bd")){var b=document.createElement("span");b.className="bd";b.textContent="×"+n;c.appendChild(b);}}
    function activate(id){["z-guard","z-clus","z-cache"].forEach(function(z){document.getElementById(z).classList.toggle("active",z===id);});}

    function setAfter(c){
        var tok=c*PER, save=Math.round((1-tok/BEFORE_TOK)*100);
        document.getElementById("afterCalls").textContent=c;
        document.getElementById("afterTok").textContent=tok.toLocaleString();
        document.getElementById("saveNum").textContent=save+"%";
    }
    function callLLM(y){
        calls++; setAfter(calls);
        llmbox.classList.add("fire"); setTimeout(function(){llmbox.classList.remove("fire");},190);
        var b=document.createElement("div");b.className="burst";b.textContent="+"+PER;
        b.style.left=(XLLM+50)+"px";b.style.top=y+"px";stage.appendChild(b);
        setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},1200);
    }
    function redisStore(g){   // Gemini 호출 → 답변을 Redis에 저장(STORE)
        var list=document.getElementById("rlist");
        var d=document.createElement("div"); d.className="ritem new"; d.setAttribute("data-g",g);
        d.innerHTML=g+' <span>✓</span>'; list.appendChild(d);
    }
    function redisFlash(g){   // 캐시 HIT → 기존 보관 항목 강조
        var el=document.querySelector('.ritem[data-g="'+g+'"]'); if(el){el.classList.remove("flash");void el.offsetWidth;el.classList.add("flash");}
    }

    async function run(){
        var my=++runId; reset(); await sleep(500); if(!alive(my))return;

        narr.innerHTML="라이브 방송에 <b>채팅 20건</b>이 동시에 쏟아집니다.";
        for(var i=0;i<C.length;i++){ if(!alive(my))return; chips[i].style.opacity="1"; await sleep(80); }
        await sleep(1000); if(!alive(my))return;

        // ① 1차 가드
        activate("z-guard");
        narr.innerHTML="<b style='color:#e01e1e'>① 1차 가드 (Aho-Corasick)</b> — 비질문·욕설·이모지 <b>5건</b>을 즉시 파기.";
        JUNK.forEach(function(id){ move(id,XGUARD,homeY(id)); });
        await sleep(1200); if(!alive(my))return;
        JUNK.forEach(function(id){ move(id,XGUARD,homeY(id)+150); fade(id); });
        await sleep(1200); if(!alive(my))return;
        narr.innerHTML="질문 <b>15건</b>만 통과합니다.";
        await sleep(1000); if(!alive(my))return;

        // ② 의미 군집화
        activate("z-clus");
        narr.innerHTML="<b style='color:#1064c0'>② 의미 군집화 (cos ≥ 0.85)</b> — 같은 뜻의 질문을 한 군집으로 묶습니다.";
        Object.keys(GROUPS).forEach(function(g){var G=GROUPS[g];G.ids.forEach(function(id){move(id,XCL,G.y);});});
        await sleep(1300); if(!alive(my))return;
        Object.keys(GROUPS).forEach(function(g){var G=GROUPS[g];
            G.ids.forEach(function(id){ if(id!==G.rep) fade(id); });
            badge(G.rep,G.ids.length);
        });
        await sleep(1100); if(!alive(my))return;
        narr.innerHTML="대표 <b>5개</b>만 남깁니다 (15 → 5).";
        await sleep(1200); if(!alive(my))return;

        // ③ 시맨틱 캐시
        activate("z-cache");
        narr.innerHTML="<b style='color:#0a7d45'>③ 시맨틱 캐시 (cos ≥ 0.92)</b> — 첫 등장은 MISS(호출·저장), 앞선 시간대에 답해 보관된 것만 HIT.";
        await sleep(1500); if(!alive(my))return;
        for(var k=0;k<REP_ORDER.length;k++){
            var id=REP_ORDER[k], y=repY(id), g=REP_NAME[id];
            if(!alive(my))return;
            move(id,XCA,y); await sleep(1100); if(!alive(my))return;
            if(HIT_REP.indexOf(id)>=0){
                chips[id].classList.add("hit"); redisFlash(g);
                narr.innerHTML="<b>"+g+"</b> — 이미 Redis에 보관됨 → <b style='color:#0a7d45'>HIT, 토큰 0</b> (Gemini 호출 안 함).";
                await sleep(1200); fade(id); await sleep(600);
            }else{
                narr.innerHTML="<b>"+g+"</b> — 캐시에 없음(MISS) → Gemini 호출.";
                await sleep(700);
                move(id,XLLM,y); await sleep(1050); if(!alive(my))return;
                callLLM(y); redisStore(g);
                narr.innerHTML="<b>"+g+"</b> 호출 완료 → 답변을 <b style='color:#0a7d45'>Redis에 저장(STORE)</b>. 다음 유사 질문은 재사용됩니다.";
                await sleep(1000); fade(id); await sleep(600);
            }
        }
        narr.innerHTML="결과: <b>채팅 20건 → 실제 Gemini 호출 3회 · 2,100토큰 · 85% 절감.</b>";
    }

    document.getElementById("replay").addEventListener("click",run);
    run();
})();
</script>
</body>
</html>

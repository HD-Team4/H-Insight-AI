services:
  # ==========================================
  # 1. 카프카 에코시스템 (Kafka Ecosystem)
  # ==========================================
  zookeeper:
    image: quay.io/debezium/zookeeper:3.0
    container_name: hinsight-zookeeper
    profiles: ["local"]
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    networks:
      - hinsight

  kafka:
    image: quay.io/debezium/kafka:3.0
    container_name: hinsight-kafka
    profiles: ["local"]
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - ZOOKEEPER_CONNECT=zookeeper:2181
      # 내부 통신용(INTERNAL:29092), 호스트 PC 접근용(EXTERNAL:9092)
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    networks:
      - hinsight

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hinsight-kafka-ui
    profiles: ["local"]
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    networks:
      - hinsight

  # 앱이 직접 produce 한 로그 토픽(purchase-history)을 S3(로컬은 MinIO)로 적재하는 Kafka Connect (Aiven S3 Sink)
  connect:
    build:
      context: ./docker/connect
    image: hinsight/kafka-connect-s3:3.0
    container_name: hinsight-connect
    profiles: ["local"]
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - minio
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    networks:
      - hinsight

  # 로컬 S3 대체 (데이터 레이크)
  minio:
    image: minio/minio:latest
    container_name: hinsight-minio
    profiles: ["local"]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 웹 콘솔
    volumes:
      - minio-data:/data
    networks:
      - hinsight

  # MinIO 버킷(hf4-datalake) 최초 1회 생성용 one-shot
  minio-setup:
    image: minio/mc:latest
    container_name: hinsight-minio-setup
    profiles: ["local"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb -p local/hf4-datalake;
      exit 0;
      "
    networks:
      - hinsight

  # ==========================================
  # 2. 엘라스틱 스택 (Elastic Stack)
  # ==========================================
  elasticsearch:
    build:
      context: ./docker/elasticsearch
      args:
        ES_VERSION: 8.15.3
    image: hinsight/elasticsearch-nori:8.15.3
    container_name: hinsight-es
    restart: unless-stopped                 # EC2 재부팅/크래시 시 자동 복구 (로컬에도 무해)
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # 내부 공용(로컬/팀 EC2). 외부 공개 시 반드시 true + TLS
      - ES_JAVA_OPTS=-Xms${ES_HEAP:-512m} -Xmx${ES_HEAP:-512m}  # 기본 512m, EC2에선 export ES_HEAP=2g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - hinsight

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: hinsight-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hinsight

  # ==========================================
  # 3. 임베딩 서버 (Ollama + BGE-M3) — 상품추천 챗봇 쿼리 임베딩
  # ==========================================
  ollama:
    image: ollama/ollama:latest
    container_name: hinsight-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama       # 받은 모델(bge-m3) 영속화 → 재기동 시 재다운로드 방지
    networks:
      - hinsight

  # bge-m3 모델 최초 1회 pull 용 one-shot (minio-setup 과 동일 패턴)
  ollama-setup:
    image: ollama/ollama:latest
    container_name: hinsight-ollama-setup
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434   # pull 대상 = ollama 서비스(원격 서버)
    entrypoint: >
      /bin/sh -c "
      until ollama list >/dev/null 2>&1; do echo 'waiting for ollama...'; sleep 2; done;
      ollama pull bge-m3;
      exit 0;
      "
  # 3. Redis (마이페이지 "최근 본 상품" 캐시)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: hinsight-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]   # 재시작해도 최근 본 상품 유지
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hinsight

# ==========================================
# 볼륨 및 네트워크 정의
# ==========================================
volumes:
  es-data:
  minio-data:
  ollama-data:
  redis-data:

networks:
  hinsight:
    driver: bridge
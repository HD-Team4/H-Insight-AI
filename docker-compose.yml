services:
  elasticsearch:
    build:
      context: ./docker/elasticsearch
      args:
        ES_VERSION: 8.15.3
    image: hinsight/elasticsearch-nori:8.15.3
    container_name: hinsight-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # 로컬 개발용: 보안(TLS) 비활성화
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - hinsight

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: hinsight-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hinsight

volumes:
  es-data:

networks:
  hinsight:
    driver: bridge

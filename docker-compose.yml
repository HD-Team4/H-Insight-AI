version: '3.8'

services:

  # 1. 주키퍼 (카프카 클러스터 관리용)
  zookeeper:
    image: quay.io/debezium/zookeeper:2.4
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181

  # 2. 아파치 카프카 (메시지 브로커)
  kafka:
    image: quay.io/debezium/kafka:2.4
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

  # 3. 데베지움 카프카 커넥트 (CDC 역할)
  connect:
    image: quay.io/debezium/connect:2.4
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - zookeeper
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses

  # 4. Kafka UI (브라우저에서 토픽과 데이터를 눈으로 확인하는 툴)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    # 5. CDC 소스 MySQL (Debezium이 이 DB의 binlog를 읽음)

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=localpass
      - MYSQL_DATABASE=hf4_db
    command:
      - --server-id=184054
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
version: '3.8'

services:
  # ==========================================
  # 1. 데이터베이스 및 CDC 소스
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: hinsight-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=localpass
      - MYSQL_DATABASE=hf4_db
    command:
      - --server-id=184054
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    networks:
      - hinsight

  # ==========================================
  # 2. 카프카 에코시스템 (Kafka Ecosystem)
  # ==========================================
  zookeeper:
    image: quay.io/debezium/zookeeper:3.0
    container_name: hinsight-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    networks:
      - hinsight

  kafka:
    image: quay.io/debezium/kafka:3.0
    container_name: hinsight-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - ZOOKEEPER_CONNECT=zookeeper:2181
      # 내부 통신용(INTERNAL:29092), 호스트 PC 접근용(EXTERNAL:9092)
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    networks:
      - hinsight

  # Debezium Connect + Aiven S3 Sink (커스텀 이미지 빌드)
  connect:
    build:
      context: ./docker/connect
    container_name: hinsight-connect
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - zookeeper
      - mysql
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    networks:
      - hinsight

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hinsight-kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    networks:
      - hinsight

  # S3 호환 로컬 스토리지 (MinIO)
  minio:
    image: minio/minio:latest
    container_name: hinsight-minio
    ports:
      - "9000:9000"   # S3 API 엔드포인트
      - "9001:9001"   # 웹 콘솔
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    networks:
      - hinsight

  # MinIO 버킷 자동 생성 (한 번 실행되고 종료)
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...MinIO 대기중'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/hf4-datalake;
      echo 'MinIO 버킷(hf4-datalake) 준비 완료';
      exit 0;
      "
    networks:
      - hinsight

  # ==========================================
  # 3. 엘라스틱 스택 (Elastic Stack)
  # ==========================================
  elasticsearch:
    build:
      context: ./docker/elasticsearch
      args:
        ES_VERSION: 8.15.3
    image: hinsight/elasticsearch-nori:8.15.3
    container_name: hinsight-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # 로컬 개발용: 보안(TLS) 비활성화
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - hinsight

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: hinsight-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hinsight

# ==========================================
# 볼륨 및 네트워크 정의
# ==========================================
volumes:
  es-data:

networks:
  hinsight:
    driver: bridge

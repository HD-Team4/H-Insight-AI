services:

  # 1. 주키퍼 (카프카 클러스터 관리용)
  zookeeper:
    image: quay.io/debezium/zookeeper:3.0
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181

  # 2. 아파치 카프카 (메시지 브로커)
  kafka:
    image: quay.io/debezium/kafka:3.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - ZOOKEEPER_CONNECT=zookeeper:2181
      # 리스너 2개: 컨테이너끼리는 INTERNAL(kafka:29092), 호스트에서는 EXTERNAL(localhost:9092)
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL

  # 3. 데베지움 카프카 커넥트 (CDC 역할)
  connect:
    image: quay.io/debezium/connect:3.0
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - zookeeper
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses

  # 4. Kafka UI (브라우저에서 토픽과 데이터를 눈으로 확인하는 툴)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092

  # 5. CDC 소스 MySQL (Debezium이 이 DB의 binlog를 읽음)
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=localpass
      - MYSQL_DATABASE=hf4_db
    command:
      - --server-id=184054
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL

  # 6. MinIO (로컬 S3 - S3 호환 오브젝트 스토리지)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API 엔드포인트
      - "9001:9001"   # 웹 콘솔 (브라우저 확인용)
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"

  # 7. MinIO 버킷 자동 생성 (한 번 실행되고 종료)
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...MinIO 대기중'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/hf4-datalake;
      echo 'MinIO 버킷(hf4-datalake) 준비 완료';
      exit 0;
      "